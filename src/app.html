<!doctype html>

<html lang="%paraglide.lang%" dir="%paraglide.dir%">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#fbf6ee" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#1a141a" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="accrev" />
		<meta name="text-scale" content="scale" />
		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/icon.svg" />
		<title>accrev</title>
		<meta
			name="description"
			content="Bilingual accounting flashcards. English ↔ Persian, built for CPA prep."
		/>

		<!-- Open Graph (Facebook, LinkedIn, iMessage, Slack, Discord, etc.) -->
		<meta property="og:type" content="website" />
		<meta property="og:site_name" content="accrev" />
		<meta property="og:title" content="accrev" />
		<meta
			property="og:description"
			content="Bilingual accounting flashcards. English ↔ Persian, built for CPA prep."
		/>
		<meta property="og:image" content="%sveltekit.assets%/og-image.svg" />
		<meta property="og:image:type" content="image/svg+xml" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:alt" content="accrev — bilingual accounting flashcards" />

		<!-- Twitter / X -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="accrev" />
		<meta
			name="twitter:description"
			content="Bilingual accounting flashcards. English ↔ Persian, built for CPA prep."
		/>
		<meta name="twitter:image" content="%sveltekit.assets%/og-image.svg" />
		<meta name="twitter:image:alt" content="accrev — bilingual accounting flashcards" />
		<script>
			// Set theme before paint to avoid flash. Defaults to dark; only flips to light when
			// the user has explicitly chosen 'light', or 'system' AND the OS prefers light.
			(function () {
				try {
					var t = localStorage.getItem('accrev:theme') || 'dark';
					var light =
						t === 'light' ||
						(t === 'system' &&
							window.matchMedia('(prefers-color-scheme: light)').matches);
					document.documentElement.setAttribute('data-theme', light ? 'light' : 'dark');
				} catch (e) {
					document.documentElement.setAttribute('data-theme', 'dark');
				}
			})();
		</script>
		%sveltekit.head%
	</head>

	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
